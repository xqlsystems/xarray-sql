[project]
site_name = "xarray-sql"
site_description = "Query Xarray with SQL"
site_author = "Alexander Merose"
site_url = "https://xqlsystems.github.io/xarray-sql"
repo_url = "https://github.com/xqlsystems/xarray-sql"
repo_name = "xqlsystems/xarray-sql"
edit_uri = "edit/main/docs/"
nav = [
  {"Home" = "index.md"},
  {"Getting started" = "examples.md"},
  {"Concepts" = [
    {"Engines" = "engines.md"},
  ]},
  {"Guides" = [
    {"Geospatial in SQL" = "geospatial.md"},
    {"Performance" = "performance.md"},
  ]},
  {"Reference" = [
    {"API" = "reference/xarray_sql.md"},
    {"Known issues" = "limitations.md"},
    {"Contributing" = "contributing.md"},
  ]}
]

# Theme configuration
[project.theme]
variant = "modern"
logo = "assets/logo.svg"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]

# Color palette - light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "blue"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

# Color palette - dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "black"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.admonition]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.pymdownx.snippets]
url_download = true
base_path = ["."]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.abbr]

[project.markdown_extensions.def_list]

# Plugins
[project.plugins]
search = {}
typeset = {}

[project.plugins.mkdocstrings.handlers.python]
paths = ["."]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_if_no_docstring = true
filters = ["!^_"]

# Extra configuration
[project.extra]

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/xqlsystems/xarray-sql"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/xarray-sql"
